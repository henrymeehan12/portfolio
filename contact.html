<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Henry Meehan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="portfolio.css">
  <style>
    body { background: #0a0a0a; color: #e8e8e8; font-family: 'Inter', sans-serif; }
    input, textarea, select {
      background: #111;
      border: 1px solid #222;
      color: #e8e8e8;
      padding: 0.875rem 1rem;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: #d4a853; }
    input::placeholder, textarea::placeholder { color: #555; }
    label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #d4a853; display: block; margin-bottom: 0.5rem; }
    .submit-btn {
      background: transparent;
      border: 1px solid #d4a853;
      color: #d4a853;
      padding: 0.875rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .submit-btn:hover { background: #d4a853; color: #0a0a0a; }
  </style>
</head>
<body>
  <nav class="fixed top-0 w-full z-50 px-6 py-4 flex items-center justify-between port-nav-dark" style="background: rgba(10,10,10,0.95); border-bottom: 1px solid #1a1a1a;">
    <a href="index.html" style="font-size:0.875rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#e8e8e8;text-decoration:none;">Henry Meehan</a>
    <button class="port-hamburger" id="port-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="flex gap-8 text-sm" style="color:#999;">
      <a href="photography.html" style="text-decoration:none;color:#999;" onmouseover="this.style.color='#d4a853'" onmouseout="this.style.color='#999'">Photography</a>
      <a href="design.html" style="text-decoration:none;color:#999;" onmouseover="this.style.color='#d4a853'" onmouseout="this.style.color='#999'">Design</a>
      <a href="about.html" style="text-decoration:none;color:#999;" onmouseover="this.style.color='#d4a853'" onmouseout="this.style.color='#999'">About</a>
      <a href="contact.html" style="text-decoration:none;color:#d4a853;">Contact</a>
    </div>
    <div class="port-nav-dropdown" id="port-nav-links">
      <a href="photography.html">Photography</a>
      <a href="design.html">Design</a>
      <a href="about.html">About</a>
      <a href="contact.html" style="color:#d4a853;">Contact</a>
    </div>
  </nav>

  <div style="padding-top:57px;min-height:100vh;display:flex;align-items:center;">
    <div class="px-8 py-20 w-full max-w-xl mx-auto">
      <p style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#d4a853;margin-bottom:1rem;">Contact</p>
      <h1 style="font-size:2.75rem;font-weight:300;margin-bottom:1rem;">Get in touch</h1>
      <p style="color:#999;margin-bottom:3rem;line-height:1.7;">Photography inquiries, engineering projects, or just want to talk about fly fishing.</p>

      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact-success.html">
        <input type="hidden" name="form-name" value="contact">
        <p style="display:none;"><input name="bot-field"></p>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="mb-6">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="" disabled selected style="color:#555;">What's this about?</option>
            <option value="photography">Photography</option>
            <option value="engineering">Engineering / Design</option>
            <option value="general">General</option>
          </select>
        </div>

        <div class="mb-8">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Tell me what's on your mind..." required style="resize:vertical;"></textarea>
        </div>

        <button type="submit" class="submit-btn">Send message →</button>
      </form>
    </div>
  </div>

  <footer class="px-8 py-12 text-center border-t" style="border-color:#1a1a1a;color:#444;font-size:0.875rem;">
    <p>© 2025 Henry Meehan · Birmingham, Alabama</p>
  </footer>

  <script>
    // Mobile nav
    (function() {
      const btn = document.getElementById('port-hamburger');
      const links = document.getElementById('port-nav-links');
      if (!btn || !links) return;
      btn.addEventListener('click', () => {
        links.classList.toggle('port-open');
        btn.classList.toggle('port-open');
      });
    })();
  </script>
</body>
</html>
